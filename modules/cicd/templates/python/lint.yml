      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python {version}
        uses: actions/setup-python@v5
        with:
          python-version: "{version}"

      - name: Install dependencies
        run: {install_cmd}

      - name: Run lint (flake8)
        run: |
          pip install flake8
          flake8 . --max-line-length=100 --extend-exclude=.venv
