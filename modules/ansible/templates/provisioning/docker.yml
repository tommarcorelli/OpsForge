    - name: Installer les dependances Docker (Debian/Ubuntu)
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
      become: true
      when: ansible_os_family == "Debian"

    - name: Ajouter la cle GPG officielle de Docker (Debian/Ubuntu)
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      become: true
      when: ansible_os_family == "Debian"

    - name: Ajouter le depot Docker (Debian/Ubuntu)
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      become: true
      when: ansible_os_family == "Debian"

    - name: Installer Docker Engine (Debian/Ubuntu)
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes
      become: true
      when: ansible_os_family == "Debian"

    - name: Installer les dependances Docker (RHEL/CentOS)
      dnf:
        name:
          - dnf-utils
          - device-mapper-persistent-data
          - lvm2
        state: present
      become: true
      when: ansible_os_family == "RedHat"

    - name: Ajouter le depot Docker (RHEL/CentOS)
      shell: >
        dnf config-manager --add-repo
        https://download.docker.com/linux/{{ 'centos' if ansible_distribution == 'CentOS' else 'rhel' }}/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo
      become: true
      when: ansible_os_family == "RedHat"

    - name: Installer Docker Engine (RHEL/CentOS)
      dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
      become: true
      when: ansible_os_family == "RedHat"

    - name: Demarrer et activer Docker
      systemd:
        name: docker
        state: started
        enabled: yes
      become: true
