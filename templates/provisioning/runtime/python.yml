    - name: Installer Python et pip (Debian/Ubuntu)
      apt:
        name:
          - python3
          - python3-pip
          - python3-venv
        state: present
      become: true
      when: ansible_os_family == "Debian"

    - name: Installer Python et pip (RHEL/CentOS)
      dnf:
        name:
          - python3
          - python3-pip
        state: present
      become: true
      when: ansible_os_family == "RedHat"
